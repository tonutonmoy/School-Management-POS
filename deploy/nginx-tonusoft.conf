# Host nginx — school-management.tonusoft.com (UI) + school-management-api.tonusoft.com (API)
# Certbot will add SSL blocks. HTTP serves ACME + redirects to HTTPS after certs exist.

upstream school_pos_app {
    server 127.0.0.1:8085;
    keepalive 32;
}

# ---------- Main app (UI) ----------
server {
    listen 80;
    listen [::]:80;
    server_name school-management.tonusoft.com;

    client_max_body_size 25m;
    large_client_header_buffers 4 16k;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name school-management.tonusoft.com;

    # Certbot paths (created by scripts/vps-nginx-ssl.sh)
    ssl_certificate     /etc/letsencrypt/live/school-management.tonusoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/school-management.tonusoft.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;
    large_client_header_buffers 4 16k;

    location /static/ {
        proxy_pass http://school_pos_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://school_pos_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ---------- API subdomain ----------
server {
    listen 80;
    listen [::]:80;
    server_name school-management-api.tonusoft.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name school-management-api.tonusoft.com;

    ssl_certificate     /etc/letsencrypt/live/school-management-api.tonusoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/school-management-api.tonusoft.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;
    large_client_header_buffers 4 16k;

    # Public API / health / webhooks (same Go app upstream)
    location ~ ^/(health|ready|metrics|webhooks/) {
        proxy_pass http://school_pos_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://school_pos_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
