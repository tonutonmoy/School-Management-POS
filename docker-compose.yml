services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: school
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-password}
      POSTGRES_DB: school_management
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school -d school_management"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  app:
    build: .
    ports:
      - "${APP_PORT:-8085}:8085"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://school:${POSTGRES_PASSWORD:-change-me-strong-password}@db:5432/school_management?sslmode=disable
      APP_PORT: "8085"
      BACKUP_DIR: /app/backups
    volumes:
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8085/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  backups:

networks:
  internal:
